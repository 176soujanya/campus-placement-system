{% extends "base.html" %}
{% block content %}
<style>
.edit-wrap { max-width: 760px; margin: 3rem auto; padding: 0 2rem; }
.edit-card { background: white; border: 1px solid #e2e0d8; border-radius: 14px; overflow: hidden; }
.edit-head { background: var(--ink); color: white; padding: 1.5rem 2rem; }
.edit-head h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
.edit-head p { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-top: 0.2rem; }
.edit-body { padding: 2rem; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
.fgroup { margin-bottom: 1rem; }
.fgroup label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.35rem; color: #555; }
.fgroup input, .fgroup select, .fgroup textarea { width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid #e2e0d8; border-radius: 8px; font-size: 0.875rem; font-family: 'DM Sans', sans-serif; outline: none; }
.fgroup input:focus, .fgroup select:focus, .fgroup textarea:focus { border-color: var(--ink); }
.fgroup textarea { resize: vertical; min-height: 90px; }
.edit-footer { display: flex; gap: 1rem; align-items: center; border-top: 1px solid #e2e0d8; padding: 1.5rem 2rem; }
.btn-save { background: var(--ink); color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-save:hover { background: var(--accent); }
.btn-back { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
.btn-back:hover { color: var(--ink); }
</style>

<div class="edit-wrap">
  <div class="edit-card">
    <div class="edit-head">
      <h1>Edit Company — {{ company.name }}</h1>
      <p>Update the placement listing details below</p>
    </div>
    <form method="POST">
      <div class="edit-body">
        <div class="form-grid-2">
          <div class="fgroup">
            <label>Company Name *</label>
            <input type="text" name="name" value="{{ company.name }}" required>
          </div>
          <div class="fgroup">
            <label>Job Role *</label>
            <input type="text" name="role" value="{{ company.role }}" required>
          </div>
        </div>
        <div class="form-grid-3">
          <div class="fgroup">
            <label>Package (LPA) *</label>
            <input type="text" name="package" value="{{ company.package }}" required>
          </div>
          <div class="fgroup">
            <label>Location</label>
            <input type="text" name="location" value="{{ company.location or '' }}">
          </div>
          <div class="fgroup">
            <label>Deadline</label>
            <input type="text" name="deadline" value="{{ company.deadline or '' }}">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="fgroup">
            <label>Domain</label>
            <select name="domain">
              {% for d in ['Technology','Finance','Consulting','Startup','Semiconductor','IT Services','Other'] %}
              <option {% if company.domain == d %}selected{% endif %}>{{ d }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="fgroup">
            <label>Type</label>
            <select name="type">
              {% for t in ['Full-Time','Internship','PPO'] %}
              <option {% if (company.type or 'Full-Time') == t %}selected{% endif %}>{{ t }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="fgroup">
          <label>Description</label>
          <textarea name="description">{{ company.description or '' }}</textarea>
        </div>
        <div class="fgroup">
          <label>Requirements (separate with |)</label>
          <input type="text" name="requirements" value="{{ company.requirements or '' }}">
        </div>
      </div>
      <div class="edit-footer">
        <button type="submit" class="btn-save">Save Changes →</button>
        <a href="/admin_dashboard?tab=companies" class="btn-back">← Back to Dashboard</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
