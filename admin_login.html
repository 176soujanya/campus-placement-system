{% extends "base.html" %}
{% block content %}
<style>
.admin-wrap { display: flex; min-height: calc(100vh - 64px); align-items: center; justify-content: center; background: var(--ink); }
.admin-box { background: white; border-radius: 16px; padding: 3rem; width: 400px; }
.admin-box h2 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.3rem; }
.admin-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.form-group { margin-bottom: 1.2rem; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: #444; }
.form-group input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; outline: none; }
.form-group input:focus { border-color: var(--ink); }
.form-submit { width: 100%; background: var(--ink); color: white; border: none; padding: 0.9rem; border-radius: 8px; font-size: 1rem; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.form-submit:hover { background: var(--accent); }
.error-msg { background: #fff0ee; border: 1px solid #ffb8ad; color: #c0392b; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 1.2rem; }
.back-note { text-align: center; margin-top: 1.2rem; font-size: 0.85rem; color: var(--muted); }
.back-note a { color: var(--ink); font-weight: 600; text-decoration: none; }
</style>

<div class="admin-wrap">
  <div class="admin-box">
    <h2>Admin Access</h2>
    <p>Sign in to manage companies, students, and applications.</p>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="form-submit">Login as Admin</button>
    </form>
    <div class="back-note"><a href="/">← Back to Portal</a></div>
  </div>
</div>
{% endblock %}
